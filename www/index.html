<!DOCTYPE html>

<body>
<div class="container">
  <h1>⚙️ Spur Gear Calculator <span>Professional Report</span></h1>
  <div class="subtitle">Cylindrical gear pair calculation tool with printable engineering report.</div>

  <!-- Basic Input Grid -->
  <div class="input-grid">
    <div class="input-group"><label>Pinion teeth z₁</label><input type="number" id="z1" value="17" min="5"></div>
    <div class="input-group"><label>Gear teeth z₂</label><input type="number" id="z2" value="46" min="5"></div>
    <div class="input-group"><label>Module m (mm)</label><input type="number" id="module" value="3.5" step="0.1" min="0.3"></div>
    <div class="input-group"><label>Pressure angle α (°)</label><input type="number" id="pressureAngle" value="22.5" step="0.5" min="14"></div>
    <div class="input-group"><label>Face width b (mm)</label><input type="number" id="faceWidth" value="26.0" step="0.5" min="5"></div>
    <div class="input-group">
      <label>Power</label>
      <div class="power-toggle">
        <input type="number" id="powerVal" value="61.147" step="0.001" min="0.1">
        <select id="powerUnit">
          <option value="kW" selected>kW</option>
          <option value="HP">HP</option>
        </select>
      </div>
    </div>
    <div class="input-group"><label>Pinion RPM</label><input type="number" id="rpm" value="2500" step="10" min="10"></div>
  </div>

  <!-- Quality, Material, Loading -->
  <div class="input-grid">
    <div class="input-group">
      <label>Gear quality Qv</label>
      <select id="quality">
        <option value="1">Q1 - Lowest</option><option value="2">Q2</option><option value="3">Q3</option>
        <option value="4">Q4</option><option value="5">Q5 - Coarse</option><option value="6" selected>Q6</option>
        <option value="7">Q7</option><option value="8">Q8 - General</option><option value="9">Q9</option>
        <option value="10">Q10 - High Precision</option><option value="11">Q11</option><option value="12">Q12 - Ultra‑Precision</option>
      </select>
    </div>
    <div class="input-group">
      <label>Material & Heat Treatment</label>
      <select id="materialSelect">
        <optgroup label="Steels">
          <option value="1045_norm">1045 Normalized (σF=200,σH=600)</option>
          <option value="1045_qt">1045 Q&T (250,700)</option>
          <option value="4140_qt">4140 Q&T (300,800)</option>
          <option value="4340_qt">4340 Q&T (320,850)</option>
          <option value="8620_ch" selected>8620 Carb. Case-Hard. (380,1200)</option>
          <option value="9310_ch">9310 Carb. Case-Hard. (420,1300)</option>
          <option value="nitralloy">Nitralloy Nitrided (350,1100)</option>
          <option value="ductile_iron">Ductile Iron (180,550)</option>
          <option value="cast_iron">Gray Cast Iron (120,450)</option>
        </optgroup>
        <optgroup label="Aluminium">
          <option value="al6061">6061-T6 (150,400)</option>
          <option value="al7075">7075-T6 (180,500)</option>
        </optgroup>
        <optgroup label="Plastics">
          <option value="nylon">Nylon 6/6 (60,80)</option>
          <option value="acetal">Acetal/Delrin (65,90)</option>
        </optgroup>
        <optgroup label="Others">
          <option value="brass">Brass (120,350)</option>
          <option value="bronze">Bronze (130,400)</option>
        </optgroup>
      </select>
    </div>
    <div class="input-group">
      <label>Loading classification</label>
      <select id="loadClass">
        <option value="uniform">Uniform (smooth) Ko=1.0</option>
        <option value="light">Light shock Ko=1.25</option>
        <option value="moderate" selected>Moderate shock Ko=1.5</option>
        <option value="heavy">Heavy shock Ko=1.75</option>
      </select>
    </div>
    <div class="input-group">
      <label>Load distribution Km</label>
      <input type="number" id="Km" value="1.064" step="0.001" min="1.0">
    </div>
  </div>

  <!-- Profile Shift Section -->
  <div class="shift-section">
    <div class="shift-options-row">
      <div class="input-group">
        <label>Profile shift type</label>
        <select id="shiftType" onchange="updateShiftUI()">
          <option value="none">Standard (x₁=x₂=0)</option>
          <option value="fixed_cc">Fixed centre distance</option>
          <option value="iso_opt">ISO optimized (max safety, αw≈25°)</option>
          <option value="manual" selected>Manual x₁, x₂</option>
          <option value="auto_sum">Auto sum (user sum, auto distrib.)</option>
        </select>
      </div>
      <div id="shiftExtraContainer" style="display:flex; flex-wrap:wrap; gap:1.5rem; align-items:center;"></div>
    </div>
  </div>

  <div class="button-row">
    <button onclick="calculateAll()">🔍 Compute All Parameters</button>
    <button class="btn-outline" onclick="exportPDF()">📄 Generate PDF Preview</button>
  </div>
  <div id="pdfActionPanel" class="pdf-action-panel" style="display:none;"></div>
  <div id="pdfViewerCard" class="pdf-viewer-card" style="display:none;">
    <h3>PDF Preview</h3>
    <iframe id="pdfPreviewFrame" class="pdf-preview-frame" title="Generated gear report PDF preview"></iframe>
    <div class="pdf-link-row">
      <a id="pdfOpenLink" href="#" target="_blank" rel="noopener">Open Full Screen</a>
      <a id="pdfDownloadLink" href="#" download>Download PDF</a>
    </div>
  </div>

  <div id="resultsContainer" class="results-grid"></div>
  <div class="footer-note">⚡ Factors Ko, Kv, Ks, Km, KB · Inspection per quality class</div>
</div>
<div id="pdfReportContainer"></div>

<script>
  const materialDB = {
    '1045_norm':{bend:200,contact:600},'1045_qt':{bend:250,contact:700},'4140_qt':{bend:300,contact:800},
    '4340_qt':{bend:320,contact:850},'8620_ch':{bend:380,contact:1200},'9310_ch':{bend:420,contact:1300},
    'nitralloy':{bend:350,contact:1100},'ductile_iron':{bend:180,contact:550},'cast_iron':{bend:120,contact:450},
    'al6061':{bend:150,contact:400},'al7075':{bend:180,contact:500},'nylon':{bend:60,contact:80},
    'acetal':{bend:65,contact:90},'brass':{bend:120,contact:350},'bronze':{bend:130,contact:400}
  };
  function calcJ(z,x){ let b=0.32+(z-20)*0.0012; b+=x*0.018; return Math.min(0.45,Math.max(0.25,b)); }
  function inv(a){ return Math.tan(a)-a; }
  function solveInv(target, guess=0.5){ let a=guess; for(let i=0;i<20;i++){ let f=Math.tan(a)-a-target; let df=Math.tan(a)**2; if(Math.abs(df)<1e-12) break; a-=f/df; if(Math.abs(f)<1e-12) break; } return a; }

  function updateShiftUI(){
    const type = document.getElementById('shiftType').value;
    const container = document.getElementById('shiftExtraContainer');
    let html='';
    if(type==='fixed_cc'){
      html=`<div class="radio-group">
        <label><input type="radio" name="fixedMethod" value="iso_opt" checked> ISO optimized (balanced sliding)</label>
        <label><input type="radio" name="fixedMethod" value="split" onchange="toggleFixedSplit()"> Manual split</label>
      </div>
      <div class="input-group"><label>Target centre distance a (mm)</label><input type="number" id="targetCenter" value="111.0" step="0.1"></div>
      <div class="input-group" id="splitGroupFixed" style="display:none;"><label>Split to pinion %</label><input type="number" id="splitPercentFixed" value="60" min="0" max="100"></div>`;
    }else if(type==='manual'){
      html=`<div class="input-group"><label>x₁</label><input type="number" id="x1_manual" value="0.3271" step="0.0001"></div>
      <div class="input-group"><label>x₂</label><input type="number" id="x2_manual" value="-0.1086" step="0.0001"></div>`;
    }else if(type==='auto_sum'){

      html=`<span>⚡ Optimized for maximum tooth safety (αw≈25°)</span>`;
    }
    container.innerHTML = html;
    if(type==='fixed_cc') toggleFixedSplit();
  }

  function calculateAll(){
    const z1=parseInt(document.getElementById('z1').value)||21;
    const z2=parseInt(document.getElementById('z2').value)||67;
    const m=parseFloat(document.getElementById('module').value)||3.0;
    const alphaDeg=parseFloat(document.getElementById('pressureAngle').value)||20.0;
    const b=parseFloat(document.getElementById('faceWidth').value)||30.0;
    let powerInput=parseFloat(document.getElementById('powerVal').value)||5.5;
    const powerUnit=document.getElementById('powerUnit').value;
    const P_kW = powerUnit === 'HP' ? powerInput * 0.7457 : powerInput;
    const rpm1=parseFloat(document.getElementById('rpm').value)||1450;
    const Qv=parseInt(document.getElementById('quality').value)||10;
    const matKey=document.getElementById('materialSelect').value;
    const loadClass=document.getElementById('loadClass').value;
    const Km=parseFloat(document.getElementById('Km').value)||1.25;
    const shiftType=document.getElementById('shiftType').value;

    const alpha=alphaDeg*Math.PI/180;
    const invAlpha=inv(alpha);
    const a0=(z1+z2)*m/2;
    let x1=0,x2=0;
    const mat=materialDB[matKey]||{bend:380,contact:1200};
    let Ko=1.0;
    if(loadClass==='light') Ko=1.25; else if(loadClass==='moderate') Ko=1.5; else if(loadClass==='heavy') Ko=1.75;

    if(shiftType==='manual'){
      x1=parseFloat(document.getElementById('x1_manual')?.value)||0;
      x2=parseFloat(document.getElementById('x2_manual')?.value)||0;
    }else if(shiftType==='fixed_cc'){
      const aTarget=parseFloat(document.getElementById('targetCenter')?.value)||a0;
      if(aTarget <= 0){ alert('Target centre distance must be positive'); return; }
      const cosAw = a0 * Math.cos(alpha) / aTarget;
      if(Math.abs(cosAw) > 1){ alert('Impossible centre distance – cos(αw) out of range'); return; }
      const aw = Math.acos(cosAw);
      const sumX = (inv(aw)-invAlpha)*(z1+z2)/(2*Math.tan(alpha));
      const method=document.querySelector('input[name="fixedMethod"]:checked')?.value||'iso_opt';
      if(method==='iso_opt'){
        // Robust search for balanced specific sliding, works for negative sumX
        let lo = Math.max(-2.0, sumX - 2.0);
        let hi = Math.min(2.0, sumX + 2.0);
        if(lo >= hi){ lo = sumX-0.5; hi = sumX+0.5; }
        for(let iter=0; iter<50; iter++){
          let mid = (lo+hi)/2;
          let x1t = mid, x2t = sumX - mid;
          let invAwT = invAlpha + 2*sumX*Math.tan(alpha)/(z1+z2);
          let awT = solveInv(invAwT, alpha + sumX*0.1);
          let aT = a0*Math.cos(alpha)/Math.cos(awT);
          let d1t=m*z1, d2t=m*z2, db1t=d1t*Math.cos(alpha), db2t=d2t*Math.cos(alpha);
          let da1t = d1t + 2*m*(1+x1t), da2t = d2t + 2*m*(1+x2t);
          // Tip shortening same logic
          let hf1t=m*(1.25-x1t), hf2t=m*(1.25-x2t);
          let df1t=d1t-2*hf1t, df2t=d2t-2*hf2t;
          let c_req=0.25*m;
          if(aT - (da1t/2 + df2t/2) < c_req){ let need=2*(aT - df2t/2 - c_req); da1t = need; }
          if(aT - (da2t/2 + df1t/2) < c_req){ let need=2*(aT - df1t/2 - c_req); da2t = need; }
          let g1t = Math.sqrt((da1t/2)**2 - (db1t/2)**2);
          let g2t = Math.sqrt((da2t/2)**2 - (db2t/2)**2);
          let slip1 = 1 - (z1/z2) * ((aT*Math.sin(awT)-g1t)/g1t);
          let slip2 = 1 - (z2/z1) * ((aT*Math.sin(awT)-g2t)/g2t);
          if(slip1 > slip2) hi = mid; else lo = mid;
        }
        x1 = (lo+hi)/2;
        x2 = sumX - x1;
      }else{
        const splitPct = parseFloat(document.getElementById('splitPercentFixed')?.value) || 60;
        x1 = sumX * splitPct / 100;
        x2 = sumX - x1;
      }
    }else if(shiftType==='iso_opt'){
      const awTarget=25*Math.PI/180;
      const sumX=(inv(awTarget)-invAlpha)*(z1+z2)/(2*Math.tan(alpha));
      x1=sumX*0.62; x2=sumX-x1;
    }else if(shiftType==='auto_sum'){
      const sumX=parseFloat(document.getElementById('sumShift')?.value)||0;
      const splitPct=parseFloat(document.getElementById('splitPercentAuto')?.value)||60;
      x1=sumX*splitPct/100; x2=sumX-x1;
    }

    const sumX=x1+x2;
    const invAw=invAlpha+2*sumX*Math.tan(alpha)/(z1+z2);
    const aw=solveInv(invAw, alpha+sumX*0.1);
    const a=a0*Math.cos(alpha)/Math.cos(aw);
    const d1=m*z1,d2=m*z2;
    const db1=d1*Math.cos(alpha),db2=d2*Math.cos(alpha);
    const dw1=d1*Math.cos(alpha)/Math.cos(aw), dw2=d2*Math.cos(alpha)/Math.cos(aw);
    const hf1=m*(1.25-x1),hf2=m*(1.25-x2);
    const df1=d1-2*hf1,df2=d2-2*hf2;
    let ha1=m*(1+x1),ha2=m*(1+x2);
    let da1=d1+2*ha1,da2=d2+2*ha2;
    const c_req=0.25*m;
    let tShort1=0,tShort2=0;
    if(a-(da1/2+df2/2)<c_req){ let need=2*(a-df2/2-c_req); tShort1=(da1-need)/2; da1=need; }
    if(a-(da2/2+df1/2)<c_req){ let need=2*(a-df1/2-c_req); tShort2=(da2-need)/2; da2=need; }
    const s1=m*(Math.PI/2+2*x1*Math.tan(alpha)),s2=m*(Math.PI/2+2*x2*Math.tan(alpha));
    const alpha_w1 = Math.acos(db1/dw1), alpha_w2 = Math.acos(db2/dw2);
    const sw1 = dw1*((s1/d1)+inv(alpha)-inv(alpha_w1));
    const sw2 = dw2*((s2/d2)+inv(alpha)-inv(alpha_w2));
    const g1=Math.sqrt((da1/2)**2-(db1/2)**2),g2=Math.sqrt((da2/2)**2-(db2/2)**2);
    const pathLen=g1+g2-a*Math.sin(aw);
    const pbt=Math.PI*m*Math.cos(alpha);
    const epsAlpha=pathLen/pbt;
    const u=z2/z1;
    const slip1=1-(1/u)*((a*Math.sin(aw)-g1)/g1),slip2=1-u*((a*Math.sin(aw)-g2)/g2);
    const xMin1=(17-z1)/17,xMin2=(17-z2)/17;
    const under1=x1<xMin1,under2=x2<xMin2;

    const rFillet1=0.38*m, rFillet2=0.38*m;
    const wholeDepth1=ha1+hf1, wholeDepth2=ha2+hf2;
    const alpha_a1=Math.acos(db1/da1), alpha_a2=Math.acos(db2/da2);
    const sa1=da1*((s1/d1)+inv(alpha)-inv(alpha_a1));
    const sa2=da2*((s2/d2)+inv(alpha)-inv(alpha_a2));
    const approachLen=Math.sqrt((da2/2)**2-(db2/2)**2)-a*Math.sin(aw);
    const recessLen=pathLen-approachLen;

    const rpm2=rpm1*z1/z2;
    const omega=2*Math.PI*rpm1/60;
    const T1=P_kW*1000/omega;
    const T2=T1*z2/z1;
    const v=omega*d1/2000;
    const Ft=2000*T1/d1;
    const Fr=Ft*Math.tan(alpha);
    const Fn=Ft/Math.cos(alpha);

    const B=0.25*(Qv-5.0)**0.667;
    const A_val=50+56*(1-B);
    const Kv=((A_val+Math.sqrt(200*v))/A_val)**B;
    const Ks=m<=5?1.0:Math.pow(m/5,0.0535);
    const KB=1.0;
    const J1=calcJ(z1,x1),J2=calcJ(z2,x2);
    const sigmaF1=(Ft/(b*m))*(Ko*Kv*Ks*Km*KB)/J1;
    const sigmaF2=(Ft/(b*m))*(Ko*Kv*Ks*Km*KB)/J2;
    const allowBend=mat.bend, allowContact=mat.contact;
    const Ze=190,Zh=2.5,Zeps=0.95;
    const sigmaH=Ze*Zh*Zeps*Math.sqrt((Ft/(b*d1))*((d1+d2)/d2)*Ko*Kv*Km);
    const SF1=allowBend/sigmaF1, SF2=allowBend/sigmaF2;
    const SH=allowContact/sigmaH;
    const minFOS=Math.min(SF1,SF2,SH);

    const tolDia1=(0.01*m*Math.sqrt(d1/10)+0.005*d1)*(12/Qv);
    const tolDia2=(0.01*m*Math.sqrt(d2/10)+0.005*d2)*(12/Qv);
    const runout1=0.02*m*(10/Qv);
    const runout2=0.02*m*(10/Qv);
    const fpt1=0.012*m*(10/Qv);
    const fpt2=0.012*m*(10/Qv);
    const Fi1=0.025*m+0.01*(d1/100);
    const Fi2=0.025*m+0.01*(d2/100);
    const k1 = Math.max(1, Math.round(z1/9 + 0.5));
    const k2 = Math.max(1, Math.round(z2/9 + 0.5));
    const W1 = m*Math.cos(alpha)*(Math.PI*(k1-0.5)+z1*Math.tan(alpha)+2*x1*Math.tan(alpha));
    const W2 = m*Math.cos(alpha)*(Math.PI*(k2-0.5)+z2*Math.tan(alpha)+2*x2*Math.tan(alpha));
    const Wtol1 = fpt1 * k1 * 1.2;
    const Wtol2 = fpt2 * k2 * 1.2;
    const backlash=0.05*m+0.03;
    const pinDia=1.68*m;
    const overPins1=d1+2*m*1.05;
    const overPins2=d2+2*m*1.05;

    window._gearData={
      z1,z2,m,alphaDeg,b,P_kW,rpm1,Qv,matKey,loadClass,Km,Ko,Kv,Ks,KB,
      x1,x2,sumX,aw,a0,a,da1,da2,df1,df2,d1,d2,db1,db2,dw1,dw2,
      ha1,ha2,hf1,hf2,s1,s2,sw1,sw2,sa1,sa2,wholeDepth1,wholeDepth2,
      rFillet1,rFillet2,tShort1,tShort2,epsAlpha,approachLen,recessLen,
      slip1,slip2,under1,under2,
      rpm2,v,T1,T2,Ft,Fr,Fn,J1,J2,sigmaF1,sigmaF2,sigmaH,SF1,SF2,SH,minFOS,
      allowBend,allowContact,
      tolDia1,tolDia2,runout1,runout2,fpt1,fpt2,Fi1,Fi2,
      k1,k2,W1,W2,Wtol1,Wtol2,backlash,pinDia,overPins1,overPins2
    };
    renderResults();
  }

          doc.setFillColor(blue[0],blue[1],blue[2]);
          doc.rect(content.x,24,content.w,5.5,'F');
          setText([255,255,255],10,'bold');
          doc.text(clean(title),content.x+1.8,28.1);
          y=34;
        }else{
          y=27;
        }
        drawFooter();
      }

      function newPage(title=''){
        doc.addPage();
        drawFrame(title);
      }

      function ensureSpace(mmNeeded, continueTitle){
        if(y+mmNeeded>content.bottom){
          newPage(continueTitle || currentTitle || 'Report continued');
        }
      }

      function section(no,title){
        ensureSpace(10,`${no} ${title} continued`);
        doc.setFillColor(blue[0],blue[1],blue[2]);
        doc.rect(content.x,y,content.w,5.4,'F');
        setText([255,255,255],9.6,'bold');
        doc.text(clean(`${no} ${title}`),content.x+1.6,y+3.9);
        y+=8.2;
      }

      function subhead(title){
        ensureSpace(7,`${currentTitle} continued`);
        setText([17,17,17],8.8,'bold');
        doc.text(clean(title),content.x,y);
        y+=4.5;
      }

      function note(text){
        const lines=doc.splitTextToSize(clean(text),content.w-14);
        const h=Math.max(7,lines.length*4+3);
        ensureSpace(h+2,'Messages continued');
        doc.setDrawColor(50,50,50);
        doc.line(content.x,y,content.x+content.w,y);
        doc.line(content.x,y+h,content.x+content.w,y+h);
        doc.setDrawColor(blue[0],blue[1],blue[2]);
        doc.circle(content.x+4,y+3.6,2.2);
        setText(blue,6.5,'bold');
        doc.text('i',content.x+4,y+4.5,{align:'center'});
        setText([17,17,17],8.5,'normal');
        doc.text(lines,content.x+10,y+4.6);
        y+=h+3;
      }

      function row(label,symbol,g1,g2,unit){
        return {label:clean(label),symbol:clean(symbol||''),g1:clean(g1 ?? ''),g2:clean(g2 ?? ''),unit:clean(unit||'')};
      }
      function pair(label,symbol,value,unit){
        return row(label,symbol,value,'',unit);
      }

      function drawTable(rows, opts={}){
        const titleForBreak=opts.continueTitle || currentTitle || 'Report continued';
        const colW=opts.colW || [76,30,32,38,18];
        const x0=content.x;
        const tableW=colW.reduce((a,b)=>a+b,0);
        const hHead=5.6;
        const pad=1.4;
        const lineH=3.25;
        const fontSize=8.2;
        const headerLabels=['Parameter','Symbol','Gear 1','Gear 2 / Pair','Unit'];

        function drawHeader(){
          ensureSpace(hHead+6,titleForBreak);
          doc.setFillColor(grey[0],grey[1],grey[2]);
          doc.rect(x0,y,tableW,hHead,'F');
          setText([17,17,17],8.4,'bold');
          let x=x0;
          for(let i=0;i<headerLabels.length;i++){
            doc.text(headerLabels[i],x+pad,y+3.9);
            x+=colW[i];
          }
          doc.setDrawColor(lineGrey[0],lineGrey[1],lineGrey[2]);
          doc.line(x0,y+hHead,x0+tableW,y+hHead);
          y+=hHead;
        }

        drawHeader();
        rows.forEach(r=>{
          const cells=[r.label,r.symbol,r.g1,r.g2,r.unit].map((v,i)=>doc.splitTextToSize(clean(v),colW[i]-pad*2));
          const maxLines=Math.max(...cells.map(c=>c.length));
          const rh=Math.max(5.4,maxLines*lineH+2.2);
          if(y+rh>content.bottom){
            newPage(titleForBreak);
            drawHeader();
          }
          setText([25,25,25],fontSize,'normal');
          let x=x0;
          for(let i=0;i<cells.length;i++){
            doc.text(cells[i],x+pad,y+3.8);
            x+=colW[i];
          }
          doc.setDrawColor(lineGrey[0],lineGrey[1],lineGrey[2]);
          doc.line(x0,y+rh,x0+tableW,y+rh);
          y+=rh;
        });
        y+=3.8;
      }

      function contentsRow(no,title,page){
        ensureSpace(6,'Contents continued');
        setText([20,20,20],9,'normal');
        const left=clean(`${no}   ${title}`);
        doc.text(left,content.x,y);
        doc.text(String(page),content.x+content.w-6,y,{align:'right'});
        const leftW=doc.getTextWidth(left)+2;
        const pageW=doc.getTextWidth(String(page))+2;
        doc.setDrawColor(120,120,120);
        doc.line(content.x+leftW,y-1.2,content.x+content.w-6-pageW,y-1.2);
        y+=5.4;
      }

      // Page 1 - title page, aligned to the provided report style but without the removed brand name.

      doc.text('Calculation method: Gear geometry and strength calculation',content.x,61);

      setText([17,17,17],8.5,'normal');
      doc.text('Calculation is consistent.',content.x,88);

      // Page 2 - contents.
      newPage('Contents');
      contentsRow('1','Messages',3);
      contentsRow('2','Overview',3);
      contentsRow('3','Tooth geometry',3);
      contentsRow('4','Materials',4);
      contentsRow('4.1','Gear roughness',4);
      contentsRow('4.2','Lubrication',4);
      contentsRow('5','Geometry',5);
      contentsRow('5.1','Reference profiles',5);
      contentsRow('5.2','Basic data',6);
      contentsRow('5.3','Diameters and their allowances',6);
      contentsRow('5.4','Tip clearances and tooth heights',7);
      contentsRow('5.5','Tooth thickness and pitch',7);
      contentsRow('5.6','Sliding',7);
      contentsRow('5.7','Contact ratios',7);
      contentsRow('6','General influence factors',8);
      contentsRow('6.1','Forces and circumferential speed',8);
      contentsRow('6.2','Calculation of K factors',8);
      contentsRow('7','Calculation of tooth root strength',9);
      contentsRow('7.1','Safety factors',9);

      section('2','Overview');
      drawTable([
        pair('Calculation method','', 'Gear geometry and strength calculation',''),

      // Page 4 - material data.

        row('Infinite life strength for Hertzian pressure','sigmaHlim',fmt2(d.allowContact),fmt2(d.allowContact),'N/mm2'),
        row('Young modulus','E','206000','206000','N/mm2'),
        row('Poisson ratio','nu','0.300','0.300',''),
        row('Tensile strength','sigmaB','1100.00','1100.00','N/mm2'),
        row('Yield point','sigmaS','775.00','775.00','N/mm2'),
        row('Surface hardness','', '59', '59','HRC')
      ],{continueTitle:'Materials continued'});

      subhead('4.1 Gear roughness');

        row('Arithmetic mean roughness value Ra, root','RAF','3.00','3.00','um'),
        row('Mean peak-to-valley roughness Rz, flank','RZH','4.80','4.80','um'),
        row('Mean peak-to-valley roughness Rz, root','RZF','20.00','20.00','um')
      ],{continueTitle:'Gear roughness continued'});

      subhead('4.2 Lubrication');
      drawTable([
        pair('Lubrication type','', 'Oil bath lubrication',''),
        pair('Type of oil','', 'ISO-VG 220',''),
        pair('Lubricant base','', 'Mineral-oil base',''),
        pair('Oil nominal kinematic viscosity at 40 C','nu40','220.00','mm2/s'),
        pair('Oil nominal kinematic viscosity at 100 C','nu100','17.50','mm2/s'),
        pair('Specific density at 15 C','rho','0.895','kg/dm3'),
        pair('Oil temperature','TS','70.000','deg C')
      ],{continueTitle:'Lubrication continued'});

      // Page 5 - geometry reference profiles.
      newPage('');
      section('5','Geometry');
      subhead('5.1 Reference profiles');
      drawTable([
        row('Dedendum reference profile','hfP*','1.250','1.250',''),
        row('Tooth root radius reference profile','rho_fP*','0.300','0.300',''),
        row('Addendum reference profile','haP*','1.000','1.000',''),
        row('Tip radius factor','rho_aP*','0.000','0.000',''),
        row('Protuberance height coefficient','hprP*','0.000','0.000',''),
        row('Protuberance angle','alpha_prP','0.000','0.000','deg'),
        row('Tip form height coefficient','hFaP*','0.000','0.000',''),
        row('Ramp angle','alpha_KP','0.000','0.000','deg'),
        row('Type of profile modification','', 'none', 'none',''),
        row('Tip relief by running in','Ca L/R','2.0 / 2.0','2.0 / 2.0','um')
      ],{continueTitle:'Reference profiles continued'});

      // Page 6 - basic geometry and diameters.
      newPage('');
      section('5','Geometry continued');
      subhead('5.2 Basic data');
      drawTable([
        pair('Overall transmission ratio','itot',fmt(-ratio,3),''),
        pair('Gear ratio','u',fmt(ratio,3),''),
        pair('Transverse module','mt',fmt3(d.m),'mm'),
        pair('Transverse pressure angle','alpha_t',fmt3(d.alphaDeg),'deg'),
        pair('Working pressure angle','alpha_wt',fmt(d.aw*180/Math.PI,3),'deg'),
        pair('Working pressure angle at normal section','alpha_wn',fmt(d.aw*180/Math.PI,3),'deg'),
        pair('Base helix angle','beta_b','0.000','deg'),
        pair('Helix angle at operating pitch circle','beta_w','0.000','deg'),
        pair('Reference center distance','ad',fmt3(d.a0),'mm'),
        pair('Sum of profile shift coefficients','Sigma xi',fmt4(d.sumX),''),
        row('Profile shift coefficient','x',fmt4(d.x1),fmt4(d.x2),''),
        row('Virtual gear number of teeth','zn',fmt3(d.z1),fmt3(d.z2),'')
      ],{continueTitle:'Basic data continued'});

      subhead('5.3 Diameters and their allowances');
      drawTable([
        row('Reference diameter','d',fmt3(d.d1),fmt3(d.d2),'mm'),
        row('Base diameter','db',fmt3(d.db1),fmt3(d.db2),'mm'),
        row('Tip diameter','da',fmt3(d.da1),fmt3(d.da2),'mm'),
        row('Tip diameter allowances','Ada e/i','0.000 / -0.030','0.000 / -0.040','mm'),
        row('Operating pitch diameter','dw',fmt3(d.dw1),fmt3(d.dw2),'mm'),
        row('Root diameter','df',fmt3(d.df1),fmt3(d.df2),'mm'),
        row('Base circle diameter','db',fmt3(d.db1),fmt3(d.db2),'mm')
      ],{continueTitle:'Diameters continued'});

      // Page 7 - heights, thickness, sliding, contact ratios.
      newPage('');
      section('5','Geometry continued');
      subhead('5.4 Tip clearances and tooth heights');
      drawTable([
        pair('Theoretical tip clearance','c',fmt3(0.25*d.m),'mm'),
        row('Addendum','ha',fmt3(d.ha1-d.tShort1),fmt3(d.ha2-d.tShort2),'mm'),
        row('Dedendum','hf',fmt3(d.hf1),fmt3(d.hf2),'mm'),
        row('Tooth height','h',fmt3(d.wholeDepth1),fmt3(d.wholeDepth2),'mm'),
        row('Root fillet radius','rho_f',fmt3(d.rFillet1),fmt3(d.rFillet2),'mm'),
        row('Tip shortening','',fmt4(d.tShort1),fmt4(d.tShort2),'mm')
      ],{continueTitle:'Tip clearances continued'});

      subhead('5.5 Tooth thickness and pitch');
      drawTable([
        row('Tooth thickness on reference circle','s',fmt3(d.s1),fmt3(d.s2),'mm'),
        row('Tooth thickness on operating pitch circle','sw',fmt3(d.sw1),fmt3(d.sw2),'mm'),
        row('Tooth thickness at tip circle','sa',fmt3(d.sa1),fmt3(d.sa2),'mm'),
        pair('Pitch on reference circle','pt',fmt3(Math.PI*d.m),'mm'),
        pair('Base pitch','pbt',fmt3(Math.PI*d.m*Math.cos(d.alphaDeg*Math.PI/180)),'mm')
      ],{continueTitle:'Tooth thickness continued'});

      subhead('5.6 Sliding');
      drawTable([
        row('Specific sliding at the tip','zeta_a',fmt4(d.slip1),fmt4(d.slip2),''),
        row('Specific sliding at the root','zeta_f',fmt4(-Math.abs(d.slip2||0)),fmt4(-Math.abs(d.slip1||0)),''),
        pair('Mean specific sliding','zeta_m',fmt4((Math.abs(d.slip1)+Math.abs(d.slip2))/2),'')
      ],{continueTitle:'Sliding continued'});

      subhead('5.7 Contact ratios');
      drawTable([
        pair('Minimal length of contact line','Lmin',fmt3(d.b),'mm'),
        pair('Transverse contact ratio','epsilon_alpha',fmt3(d.epsAlpha),''),
        pair('Overlap ratio','epsilon_beta','0.000',''),
        pair('Total contact ratio','epsilon_gamma',fmt3(d.epsAlpha),''),
        pair('Length of path of contact','ga',fmt3(d.approachLen+d.recessLen),'mm'),
        pair('Length of path of approach','',fmt3(d.approachLen),'mm'),
        pair('Length of path of recess','',fmt3(d.recessLen),'mm')
      ],{continueTitle:'Contact ratios continued'});

      // Page 8 - general influence factors.
      newPage('');
      section('6','General influence factors');
      subhead('6.1 Forces and circumferential speed');
      drawTable([
        pair('Nominal circumferential force at pitch circle','Ft',fmt2(d.Ft),'N'),
        row('Axial force','Fa','0.00','0.00','N'),
        row('Radial force','Fr',fmt2(d.Fr),fmt2(d.Fr),'N'),
        row('Normal force','Fnorm',fmt2(d.Fn),fmt2(d.Fn),'N'),
        pair('Nominal circumferential force per mm','w',fmt2(d.Ft/d.b),'N/mm'),
        pair('Circumferential speed reference circle','v',fmt2(d.v),'m/s'),
        pair('Circumferential speed operating pitch circle','v(dw)',fmt2((2*Math.PI*d.rpm1/60)*d.dw1/2000),'m/s')
      ],{continueTitle:'Forces continued'});

      subhead('6.2 Calculation of K factors');
      drawTable([
        pair('Dynamic factor','Kv',fmt4(d.Kv),''),
        pair('Face load factor - flank','KHbeta / Km',fmt3(d.Km),''),
        pair('Face load factor - tooth root','KFbeta',fmt3(Math.max(1,d.Km*0.982)),''),
        pair('Transverse load factor - flank','KHalpha','1.000',''),
        pair('Transverse load factor - tooth root','KFalpha','1.000',''),
        pair('Application factor','KA / Ko',fmt3(d.Ko),''),
        pair('Mesh load factor','Kgamma','1.000',''),
        pair('Size factor','Ks',fmt3(d.Ks),''),
        pair('Rim thickness factor','KB',fmt3(d.KB),'')
      ],{continueTitle:'K factors continued'});

      // Page 9 - root strength.
      newPage('');
      section('7','Calculation of tooth root strength (fracture)');
      drawTable([
        row('Geometry factor','J',fmt4(d.J1),fmt4(d.J2),''),
        row('Tooth form factor','YF','1.447','1.611',''),
        row('Stress correction factor','YS','2.106','1.913',''),
        row('Helix angle factor','Ybeta','1.000','1.000',''),
        row('Deep tooth factor','YDT','1.000','1.000',''),
        row('Gear rim factor','YB','1.00','1.00',''),
        row('Effective facewidth','beff',fmt2(26.5),fmt2(d.b),'mm'),
        row('Tooth root stress','sigmaF',fmt2(d.sigmaF1),fmt2(d.sigmaF2),'N/mm2'),
        row('Limit strength tooth root','sigmaFG',fmt2(d.allowBend),fmt2(d.allowBend),'N/mm2'),
        row('Permissible tooth root stress','sigmaFP',fmt2(d.allowBend/1.4),fmt2(d.allowBend/1.4),'N/mm2')
      ],{continueTitle:'Tooth root strength continued'});
      subhead('7.1 Safety factors');
      drawTable([
        row('Required safety','SFmin','1.40','1.40',''),
        row('Safety for tooth root stress','SF',fmt2(d.SF1),fmt2(d.SF2),''),
        row('Transmittable power','kWRating',fmt2(d.P_kW*d.SF1),fmt2(d.P_kW*d.SF2),'kW')
      ],{continueTitle:'Root safety continued'});

      // Page 10 - flank strength.
      newPage('');
      section('8','Calculation of flank strength (pitting)');
      drawTable([
        pair('Zone factor','ZH','2.326',''),
        pair('Elasticity coefficient','ZE','189.812','sqrt(N/mm2)'),
        pair('Contact ratio factor','Zepsilon','0.922',''),
        pair('Helix angle factor','Zbeta','1.000',''),
        pair('Effective facewidth','beff',fmt2(d.b),'mm'),
        pair('Contact stress','sigmaH',fmt2(d.sigmaH),'N/mm2'),
        pair('Permissible contact stress','sigmaHP',fmt2(d.allowContact),'N/mm2'),
        pair('Pitting stress limit','sigmaHG',fmt2(d.allowContact),'N/mm2')
      ],{continueTitle:'Flank strength continued'});
      subhead('8.1 Safety factors');
      drawTable([
        row('Required safety','SHmin','1.00','1.00',''),
        row('Safety factor for contact stress','SH',fmt2(d.SH),fmt2(d.SH),''),
        row('Safety regarding transmittable torque','SH2',fmt2(d.SH*d.SH),fmt2(d.SH*d.SH),''),
        row('Transmittable power','kWRating',fmt2(d.P_kW*d.SH*d.SH),fmt2(d.P_kW*d.SH*d.SH),'kW'),
        pair('Minimum safety factor','',fmt2(d.minFOS),'')
      ],{continueTitle:'Flank safety continued'});

      // Page 11 - measurements and tolerances.

      section('9','Measurements for tooth thickness');
      subhead('9.1 Tooth thickness tolerances');
      drawTable([
        row('Number of teeth for span measurement','k',d.k1,d.k2,''),
        row('Base tangent length / span measurement','W',fmt3(d.W1),fmt3(d.W2),'mm'),
        row('Span tolerance','Wtol',`+/-${fmt4(d.Wtol1)}`,`+/-${fmt4(d.Wtol2)}`,'mm'),
        pair('Measuring pin diameter','',fmt3(d.pinDia),'mm'),
        row('Measurement over pins','M',fmt2(d.overPins1),fmt2(d.overPins2),'mm'),

      section('10','Toothing tolerances');
      drawTable([
        row('Diameter tolerance','',`+/-${fmt4(d.tolDia1)}`,`+/-${fmt4(d.tolDia2)}`,'mm'),
        row('Runout','Fr',fmt4(d.runout1),fmt4(d.runout2),'mm'),

      ],{continueTitle:'Toothing tolerances continued'});

      // Replace total page placeholders.
      if(typeof doc.putTotalPages === 'function'){
        doc.putTotalPages(totalPagesExp);
      }

      const blob=doc.output('blob');
      const blobUrl=URL.createObjectURL(blob);
      if(window._lastGeneratedGearPdfUrl){
        try{ URL.revokeObjectURL(window._lastGeneratedGearPdfUrl); }catch(revokeErr){}
      }
      window._lastGeneratedGearPdfUrl=blobUrl;
      if(previewFrame){ previewFrame.src=blobUrl; }
      if(openLink){ openLink.href=blobUrl; }
      if(downloadLink){ downloadLink.href=blobUrl; downloadLink.download=filename; }
      if(viewerCard){
        viewerCard.style.display='block';
        setTimeout(()=>viewerCard.scrollIntoView({behavior:'smooth', block:'start'}), 100);
      }
      if(actionPanel){
        actionPanel.innerHTML=`PDF preview generated below. <a href="${blobUrl}" target="_blank" rel="noopener">Open Full Screen</a> <a href="${blobUrl}" download="${filename}">Download PDF</a>`;
      }
    }catch(err){
      console.error(err);
      if(viewerCard){ viewerCard.style.display='none'; }
      if(actionPanel){
        actionPanel.style.display='block';
        actionPanel.innerHTML='PDF preview failed. Please try again.';
      }
      alert('PDF preview failed. Please try again.');
    }
  }

  updateShiftUI();
  calculateAll();

  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
